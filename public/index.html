<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f7f8f5">
  <title>manimani</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/ui.css">
  <style>
    *{box-sizing:border-box}html,body,#app{min-height:100%;margin:0}
    body{background:#f7f8f5;color:#17201b;font-family:"Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif}
    button,input,textarea{font:inherit}button{touch-action:manipulation}
    @keyframes wheel-turn{to{transform:rotate(360deg)}}
    @keyframes cow-run{0%,100%{transform:translateY(3px) rotate(-2deg)}50%{transform:translateY(-5px) rotate(2deg)}}
    @keyframes dot-pulse{50%{opacity:.35;transform:scale(.75)}}
    .wheel-spin{transform-origin:160px 160px;animation:wheel-turn var(--wheel-speed,8.3s) linear infinite}
    .cow-run{transform-origin:160px 185px;animation:cow-run var(--cow-speed,.42s) ease-in-out infinite}
    @media(prefers-reduced-motion:reduce){.wheel-spin,.cow-run{animation:none!important}*,*:before,*:after{scroll-behavior:auto!important;transition-duration:.01ms!important}}
  </style>
</head>
<body><div id="app"></div><script src="js/main.js"></script></body>
</html>
