<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="720" viewBox="0 0 1440 720">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#17201b" flood-opacity=".14"/></filter>
    <symbol id="wheel" viewBox="0 0 180 180"><circle cx="90" cy="90" r="76" fill="#40345f" stroke="#17201b" stroke-width="8"/><circle cx="90" cy="90" r="59" fill="none" stroke="#fffaf0" stroke-width="6"/><path d="M90 16v148M16 90h148M38 38l104 104M142 38 38 142" stroke="#ffd76a" stroke-width="7" stroke-linecap="round"/><circle cx="90" cy="90" r="11" fill="#fffaf0" stroke="#17201b" stroke-width="5"/></symbol>
    <symbol id="face" viewBox="0 0 130 130"><g stroke="#17201b" stroke-width="6" stroke-linejoin="round"><path d="M25 46Q10 23 34 19l13 14q18-10 36 0l13-14q24 4 9 27l5 43q3 34-45 34T20 89z" fill="#ffd76a"/><path d="m39 31-7-22 22 15m37 7 7-22-22 15" fill="#ffd76a"/><circle cx="49" cy="62" r="6" fill="#17201b"/><circle cx="81" cy="62" r="6" fill="#17201b"/><ellipse cx="65" cy="91" rx="28" ry="20" fill="#ffbeaa"/><circle cx="56" cy="90" r="3"/><circle cx="74" cy="90" r="3"/><path d="M56 101q9 8 18 0" fill="none" stroke-linecap="round"/></g></symbol>
    <symbol id="runner" viewBox="0 0 160 100"><g stroke="#17201b" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="76" cy="49" rx="47" ry="28" fill="#ffd76a"/><path d="M110 33q24-16 34 7l-2 28q-3 20-25 14l-17-13z" fill="#ffd76a"/><path d="m121 30 2-18 11 16m5 4 10-11-3 19" fill="#ffd76a"/><path d="M30 39Q14 24 9 40" fill="none"/><ellipse cx="128" cy="62" rx="14" ry="10" fill="#ffbeaa"/><circle cx="127" cy="44" r="3"/><path d="M49 70 31 91M72 74l15 17M95 72 78 92M112 69l20 17" fill="none"/></g></symbol>
    <symbol id="foot" viewBox="0 0 28 38"><ellipse cx="14" cy="24" rx="9" ry="12" fill="#40345f"/><circle cx="5" cy="8" r="4" fill="#40345f"/><circle cx="14" cy="5" r="4" fill="#40345f"/><circle cx="23" cy="8" r="4" fill="#40345f"/></symbol>
    <symbol id="receipt" viewBox="0 0 70 90"><path d="M8 5h54v77l-9-6-9 6-9-6-9 6-9-6-9 6z" fill="#fff" stroke="#17201b" stroke-width="5"/><path d="m19 42 10 10 22-25" fill="none" stroke="#23845b" stroke-width="7" stroke-linecap="round"/><path d="M18 64h34" stroke="#637069" stroke-width="4"/></symbol>
    <style>.turn{transform-box:fill-box;transform-origin:center;animation:r 9s linear infinite}.breathe{transform-box:fill-box;transform-origin:center;animation:b 1.8s ease-in-out infinite alternate}@keyframes r{to{transform:rotate(360deg)}}@keyframes b{to{transform:translateY(-3px)}}@media(prefers-reduced-motion:reduce){.turn,.breathe{animation:none}}</style>
  </defs>
  <rect width="1440" height="720" fill="#f7f8f5"/><text x="34" y="35" fill="#637069" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="800" letter-spacing="1.4">MANIMANI · 十牛図 LOGO SYSTEM / TEN STAGES OF AN AGENT LOOP</text><text x="1406" y="35" fill="#637069" font-family="'Noto Sans JP',sans-serif" font-size="10" text-anchor="end">尋牛 → 入鄽垂手 → 次の尋牛</text>

  <!-- 01 尋牛 -->
  <g transform="translate(28 62)" font-family="'Noto Sans JP',sans-serif" filter="url(#s)"><rect width="260" height="290" rx="28" fill="#fff"/><circle cx="130" cy="112" r="80" fill="none" stroke="#40345f" stroke-width="9" stroke-dasharray="45 16"/><circle cx="130" cy="112" r="13" fill="#ffd76a"/><path d="M130 112 178 75" stroke="#17201b" stroke-width="7" stroke-linecap="round"/><circle cx="183" cy="71" r="12" fill="#fff" stroke="#17201b" stroke-width="6"/><text x="22" y="218" fill="#637069" font-size="10" font-weight="800">01 · SEARCH</text><text x="22" y="249" fill="#17201b" font-size="20" font-weight="900">尋牛</text><text x="22" y="272" fill="#637069" font-size="10">まだ牛は見えない。signalを探す。</text></g>

  <!-- 02 見跡 -->
  <g transform="translate(308 62)" font-family="'Noto Sans JP',sans-serif" filter="url(#s)"><rect width="260" height="290" rx="28" fill="#fff"/><path d="M48 170C83 136 96 86 149 64s59 10 78-11" fill="none" stroke="#65ccb2" stroke-width="5" stroke-dasharray="5 9"/><use href="#foot" x="61" y="128" width="28" height="38" transform="rotate(-25 75 147)"/><use href="#foot" x="105" y="91" width="24" height="33" transform="rotate(20 117 107)"/><use href="#foot" x="158" y="62" width="20" height="28" transform="rotate(-15 168 76)"/><circle cx="200" cy="50" r="27" fill="#fff6db"/><path d="M188 50h24M200 38v24" stroke="#f2b84b" stroke-width="5" stroke-linecap="round"/><text x="22" y="218" fill="#637069" font-size="10" font-weight="800">02 · TRACE</text><text x="22" y="249" fill="#17201b" font-size="20" font-weight="900">見跡</text><text x="22" y="272" fill="#637069" font-size="10">log、mail、Issueに痕跡を見つける。</text></g>

  <!-- 03 見牛 -->
  <g transform="translate(588 62)" font-family="'Noto Sans JP',sans-serif" filter="url(#s)"><rect width="260" height="290" rx="28" fill="#fff"/><circle cx="130" cy="112" r="78" fill="#eee6fa"/><path d="M55 116a76 76 0 0 1 151-12" fill="none" stroke="#40345f" stroke-width="9" stroke-linecap="round"/><use class="breathe" href="#face" x="82" y="65" width="96" height="96"/><path d="M52 155q78 34 156 0" fill="none" stroke="#65ccb2" stroke-width="5"/><text x="22" y="218" fill="#637069" font-size="10" font-weight="800">03 · GLIMPSE</text><text x="22" y="249" fill="#17201b" font-size="20" font-weight="900">見牛</text><text x="22" y="272" fill="#637069" font-size="10">問題の本体と仮説が見える。</text></g>

  <!-- 04 得牛 -->
  <g transform="translate(868 62)" font-family="'Noto Sans JP',sans-serif" filter="url(#s)"><rect width="260" height="290" rx="28" fill="#fff"/><use href="#wheel" x="48" y="31" width="164" height="164"/><use href="#face" x="82" y="65" width="96" height="96"/><path d="M42 161q29 31 56 6" fill="none" stroke="#ed6e5c" stroke-width="7" stroke-linecap="round"/><circle cx="40" cy="160" r="8" fill="#ed6e5c"/><text x="22" y="218" fill="#637069" font-size="10" font-weight="800">04 · SCOPE</text><text x="22" y="249" fill="#17201b" font-size="20" font-weight="900">得牛</text><text x="22" y="272" fill="#637069" font-size="10">scopeを定め、loopへ結びつける。</text></g>

  <!-- 05 牧牛 -->
  <g transform="translate(1148 62)" font-family="'Noto Sans JP',sans-serif" filter="url(#s)"><rect width="260" height="290" rx="28" fill="#fff"/><g class="turn"><use href="#wheel" x="48" y="31" width="164" height="164"/></g><use class="breathe" href="#runner" x="59" y="88" width="145" height="91"/><path d="M44 178h172" stroke="#17201b" stroke-width="7" stroke-linecap="round"/><text x="22" y="218" fill="#637069" font-size="10" font-weight="800">05 · STEER</text><text x="22" y="249" fill="#17201b" font-size="20" font-weight="900">牧牛</text><text x="22" y="272" fill="#637069" font-size="10">agentを観察し、修正し、育てる。</text></g>

  <!-- 06 騎牛帰家 -->
  <g transform="translate(28 380)" font-family="'Noto Sans JP',sans-serif" filter="url(#s)"><rect width="260" height="290" rx="28" fill="#fffaf0"/><path d="M36 159q94-79 188 0" fill="none" stroke="#65ccb2" stroke-width="6"/><circle cx="130" cy="112" r="72" fill="#fff" stroke="#40345f" stroke-width="7"/><use href="#runner" x="58" y="75" width="150" height="94"/><path d="M52 178h156" stroke="#17201b" stroke-width="6" stroke-linecap="round"/><path d="M195 65h27v27" fill="none" stroke="#ed6e5c" stroke-width="6"/><text x="22" y="218" fill="#637069" font-size="10" font-weight="800">06 · FLOW</text><text x="22" y="249" fill="#17201b" font-size="20" font-weight="900">騎牛帰家</text><text x="22" y="272" fill="#637069" font-size="10">automationが馴染み、自然に帰る。</text></g>

  <!-- 07 忘牛存人 -->
  <g transform="translate(308 380)" font-family="'Noto Sans JP',sans-serif" filter="url(#s)"><rect width="260" height="290" rx="28" fill="#fff"/><circle cx="130" cy="112" r="76" fill="none" stroke="#40345f" stroke-width="8" opacity=".36"/><circle cx="130" cy="112" r="42" fill="#fff6db"/><path d="M106 125q24 18 48 0M112 101h1m34 0h1" stroke="#17201b" stroke-width="7" stroke-linecap="round"/><path d="M59 158q71 25 142 0" fill="none" stroke="#65ccb2" stroke-width="5"/><text x="22" y="218" fill="#637069" font-size="10" font-weight="800">07 · RECEDE</text><text x="22" y="249" fill="#17201b" font-size="20" font-weight="900">忘牛存人</text><text x="22" y="272" fill="#637069" font-size="10">agentは退き、ユーザーと成果が残る。</text></g>

  <!-- 08 人牛倶忘 -->
  <g transform="translate(588 380)" font-family="'Noto Sans JP',sans-serif" filter="url(#s)"><rect width="260" height="290" rx="28" fill="#fff"/><circle cx="130" cy="112" r="74" fill="none" stroke="#17201b" stroke-width="10"/><circle cx="130" cy="112" r="53" fill="#f7f8f5"/><circle cx="130" cy="112" r="4" fill="#65ccb2"/><text x="22" y="218" fill="#637069" font-size="10" font-weight="800">08 · EMPTY</text><text x="22" y="249" fill="#17201b" font-size="20" font-weight="900">人牛倶忘</text><text x="22" y="272" fill="#637069" font-size="10">UIもagentも前面から消える。</text></g>

  <!-- 09 返本還源 -->
  <g transform="translate(868 380)" font-family="'Noto Sans JP',sans-serif" filter="url(#s)"><rect width="260" height="290" rx="28" fill="#fff"/><circle cx="130" cy="112" r="77" fill="#eaf8f2"/><path d="M54 133q26-49 52-11t48-17 52 20" fill="none" stroke="#23845b" stroke-width="6" stroke-linecap="round"/><path d="M63 150q67 32 134 0" fill="none" stroke="#2677d8" stroke-width="5"/><path d="M130 48v51m0-25-22-14m22 14 24-18" stroke="#17201b" stroke-width="5" stroke-linecap="round"/><circle cx="130" cy="48" r="9" fill="#ffd76a"/><text x="22" y="218" fill="#637069" font-size="10" font-weight="800">09 · RETURN</text><text x="22" y="249" fill="#17201b" font-size="20" font-weight="900">返本還源</text><text x="22" y="272" fill="#637069" font-size="10">学びをsystemへ還し、次を観る。</text></g>

  <!-- 10 入鄽垂手 -->
  <g transform="translate(1148 380)" font-family="'Noto Sans JP',sans-serif" filter="url(#s)"><rect width="260" height="290" rx="28" fill="#fff"/><path d="M34 175h192M53 175v-57h48v57m21 0V90h52v85m18 0v-38h28v38" fill="none" stroke="#c9d0cb" stroke-width="6" stroke-linejoin="round"/><use href="#runner" x="31" y="84" width="134" height="84"/><use href="#receipt" x="161" y="73" width="58" height="75"/><path d="M44 68q73-48 146-4" fill="none" stroke="#ed6e5c" stroke-width="6" stroke-linecap="round"/><path d="m183 53 15 13-18 7" fill="#ed6e5c" stroke="#ed6e5c"/><text x="22" y="218" fill="#637069" font-size="10" font-weight="800">10 · GIVE</text><text x="22" y="249" fill="#17201b" font-size="20" font-weight="900">入鄽垂手</text><text x="22" y="272" fill="#637069" font-size="10">receiptを携え、現実へ価値を届ける。</text></g>
</svg>
